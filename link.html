<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSCORP — Ficheiro Protegido</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    background:#000;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    font-family:'Share Tech Mono',monospace;
    overflow:hidden;
    position:relative;
  }

  /* grain */
  body::before{
    content:'';position:fixed;inset:0;z-index:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;opacity:.4;
  }

  /* floating particles */
  .particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .p{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(100,50,200,.3);animation:float linear infinite;}
  @keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0;}10%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(-10vh) translateX(30px);opacity:0;}}

  /* main card */
  .card{
    position:relative;z-index:2;
    width:420px;
    background:rgba(5,5,15,.95);
    border:1px solid rgba(100,50,200,.3);
    box-shadow:0 0 40px rgba(80,0,160,.15),0 0 80px rgba(0,0,50,.5);
    padding:0;
    overflow:hidden;
  }

  /* header */
  .card-header{
    background:linear-gradient(90deg,#0a001a,#150030,#0a001a);
    padding:16px 20px;
    border-bottom:1px solid rgba(100,50,200,.2);
    display:flex;align-items:center;gap:12px;
  }
  .card-logo{
    font-family:'VT323',monospace;font-size:24px;
    color:rgba(180,100,255,.8);letter-spacing:3px;
  }
  .card-subtitle{font-size:9px;color:rgba(255,255,255,.2);margin-top:2px;}

  /* body */
  .card-body{padding:24px 28px;}

  .file-info{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(100,50,200,.15);
    border-radius:4px;
    padding:12px 14px;
    margin-bottom:24px;
  }
  .file-icon{font-size:28px;margin-bottom:6px;}
  .file-name{font-size:12px;color:rgba(200,150,255,.8);margin-bottom:4px;}
  .file-meta{font-size:9px;color:rgba(255,255,255,.2);line-height:1.6;}

  .form-label{
    font-size:10px;color:rgba(255,255,255,.4);
    margin-bottom:8px;display:block;letter-spacing:1px;
  }
  .input-row{display:flex;gap:8px;margin-bottom:8px;}
  .pass-input{
    flex:1;height:36px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(100,50,200,.3);
    color:#fff;font-size:14px;font-family:'VT323',monospace;
    padding:0 12px;letter-spacing:4px;outline:none;
    transition:border-color .2s;
  }
  .pass-input:focus{border-color:rgba(150,80,255,.7);}
  .pass-input.error{border-color:#ff4444;animation:shake .4s ease;}
  .pass-input.ok{border-color:#44ff88;}

  .btn-unlock{
    height:36px;padding:0 16px;
    background:linear-gradient(135deg,#4400aa,#2200aa);
    border:1px solid rgba(150,80,255,.4);
    color:#fff;font-size:12px;font-family:'VT323',monospace;
    letter-spacing:2px;cursor:pointer;
    transition:background .2s;
    white-space:nowrap;
  }
  .btn-unlock:hover{background:linear-gradient(135deg,#5500cc,#3300cc);}

  .err-msg{
    font-size:9px;color:#ff4444;height:14px;
    transition:opacity .2s;
  }

  /* success */
  .success-panel{
    display:none;text-align:center;padding:10px 0;
  }
  .success-panel.on{display:block;}
  .success-icon{font-size:36px;margin-bottom:10px;}
  .success-title{
    font-family:'VT323',monospace;font-size:22px;
    color:#44ff88;letter-spacing:3px;margin-bottom:8px;
  }
  .success-msg{font-size:9px;color:rgba(255,255,255,.4);line-height:1.7;margin-bottom:18px;}
  .btn-download{
    display:inline-block;padding:8px 24px;
    background:linear-gradient(135deg,#004400,#002200);
    border:1px solid rgba(50,200,80,.4);
    color:#44ff88;font-size:13px;font-family:'VT323',monospace;
    letter-spacing:2px;cursor:pointer;text-decoration:none;
    transition:background .2s;
  }
  .btn-download:hover{background:linear-gradient(135deg,#006600,#003300);}

  /* scanlines */
  .scanlines{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
  }

  /* footer */
  .card-footer{
    border-top:1px solid rgba(100,50,200,.1);
    padding:8px 20px;
    font-size:8px;color:rgba(255,255,255,.1);
    display:flex;justify-content:space-between;
  }

  @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
  @keyframes pulse{0%,100%{opacity:.4;}50%{opacity:.8;}}
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="particles" id="particles"></div>

<div class="card">
  <div class="card-header">
    <div>
      <div class="card-logo">SYSCORP</div>
      <div class="card-subtitle">SISTEMA DE TRANSFERÊNCIA SEGURA · v2.1</div>
    </div>
  </div>

  <div class="card-body">

    <div class="file-info">
      <div class="file-icon">📦</div>
      <div class="file-name">Dados.zip</div>
      <div class="file-meta">
        Remetente: Kael<br>
        Data: 5/9/2024 · 16:48<br>
        Estado: <span style="color:#ffaa44;">🔒 Protegido por palavra-passe</span>
      </div>
    </div>

    <div id="form-panel">
      <label class="form-label">PALAVRA-PASSE DE ACESSO</label>
      <div class="input-row">
        <input type="password" class="pass-input" id="pass-in" maxlength="8"
          placeholder="• • • •"
          onkeydown="if(event.key==='Enter')tryUnlock()">
        <button class="btn-unlock" onclick="tryUnlock()">ENTRAR</button>
      </div>
      <div class="err-msg" id="err-msg"></div>
    </div>

    <div class="success-panel" id="success-panel">
      <div class="success-icon">✅</div>
      <div class="success-title">ACESSO CONCEDIDO</div>
      <div class="success-msg">
        Palavra-passe correta.<br>
        O ficheiro está pronto para transferência.
      </div>
      <a class="btn-download" href="Dados.zip" download="Dados.zip" id="btn-dl" onclick="unlockAndReturn()">
        ⬇ DESCARREGAR Dados.zip
      </a>
    </div>

  </div>

  <div class="card-footer">
    <span>SYSCORP SECURE TRANSFER</span>
    <span id="footer-time"></span>
  </div>
</div>

<script>
// ── PARTICLES ──
const pWrap = document.getElementById('particles');
for(let i=0;i<18;i++){
  const p = document.createElement('div');
  p.className = 'p';
  p.style.left = Math.random()*100+'%';
  p.style.animationDuration = (8+Math.random()*14)+'s';
  p.style.animationDelay = (-Math.random()*14)+'s';
  p.style.opacity = 0.2+Math.random()*0.4;
  pWrap.appendChild(p);
}

// ── CLOCK ──
function tick(){
  const n = new Date();
  document.getElementById('footer-time').textContent =
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}
tick(); setInterval(tick,1000);

// ── UNLOCK ──
const CORRECT = '8187';

function tryUnlock(){
  const inp = document.getElementById('pass-in');
  const err = document.getElementById('err-msg');
  const v = inp.value.trim();

  if(!v){ err.textContent = 'Introduz a palavra-passe.'; return; }

  if(v === CORRECT){
    inp.classList.remove('error');
    inp.classList.add('ok');
    err.textContent = '';
    setTimeout(()=>{
      document.getElementById('form-panel').style.display = 'none';
      document.getElementById('success-panel').classList.add('on');
    }, 400);
  } else {
    inp.classList.add('error');
    err.textContent = '⛔ Palavra-passe incorreta.';
    inp.value = '';
    setTimeout(()=>inp.classList.remove('error'), 500);
  }
}

// ── REDIRECT AFTER DOWNLOAD ──
function unlockAndReturn(){
  // Abre o download e redireciona o index com ?dados=1
  setTimeout(()=>{
    if(window.opener){
      // Se abriu a partir do index.html, navega lá com o parâmetro
      window.opener.location.href = 'index.html?dados=1';
      window.close();
    } else {
      window.location.href = 'index.html?dados=1';
    }
  }, 800);
}

// ── BLOCK DEVTOOLS ──
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key.toUpperCase()))||(e.ctrlKey&&['U','S'].includes(e.key.toUpperCase())))
    e.preventDefault();
});
</script>
</body>
</html>
