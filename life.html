<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Life Project</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body {
  background:#000;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  min-height:100vh; overflow:hidden;
  font-family:'Courier New',monospace;
}
#gc { image-rendering:pixelated; image-rendering:crisp-edges; display:block; }

/* MOBILE CONTROLS */
#mob {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  height:150px; pointer-events:none; z-index:20;
}
@media (pointer:coarse) { #mob { display:block; } }
#jzone {
  position:absolute; left:18px; bottom:16px;
  width:118px; height:118px; pointer-events:all;
}
#jbase {
  position:absolute; inset:0;
  border-radius:50%;
  background:rgba(255,255,255,0.07);
  border:2px solid rgba(255,255,255,0.2);
}
#jknob {
  position:absolute;
  width:48px; height:48px; top:35px; left:35px;
  border-radius:50%;
  background:rgba(255,200,0,0.28);
  border:2px solid rgba(255,200,0,0.55);
  box-shadow:0 0 10px rgba(255,180,0,0.3);
}
#bE {
  position:absolute; right:20px; bottom:20px;
  width:84px; height:84px; border-radius:50%;
  background:rgba(60,0,130,0.55);
  border:3px solid rgba(140,70,255,0.75);
  color:#ffd700; font:bold 28px monospace;
  display:flex; align-items:center; justify-content:center;
  pointer-events:all;
  -webkit-tap-highlight-color:transparent; user-select:none;
  box-shadow:0 0 18px rgba(90,0,200,0.4);
  transition:transform .07s, background .07s;
}
#bE.on { background:rgba(110,0,200,0.75); transform:scale(.9); }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="mob">
  <div id="jzone"><div id="jbase"></div><div id="jknob"></div></div>
  <div id="bE">E</div>
</div>
<script>
// ════════════════════════════════════════════════════════
//  CANVAS SETUP
// ════════════════════════════════════════════════════════
const gc = document.getElementById('gc');
const cx = gc.getContext('2d');
const W = 320, H = 224;
const SC = Math.max(2, Math.min(4,
  Math.floor(Math.min(window.innerWidth / W, (window.innerHeight - 155) / H))
));
gc.width = W; gc.height = H;
gc.style.width  = W * SC + 'px';
gc.style.height = H * SC + 'px';

// P = logical pixel width (each sprite "dot" = P screen pixels)
const P = 2;

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let gs    = 'title'; // title | intro | playing | win | secret
let room  = 'hub';
let pl    = { x: 160, y: 140, sp: 1.5 };

let itBalloons = false;
let itConfetti = false;
let itCake     = false;

let childGone  = false;
let childEcho  = '';
let echoTimer  = 0;  // seconds

let foxDone    = false;
let hasSword   = false;
let spiderAlive= true;
let fightAnim  = 0;   // >0 means animation playing
let s2phase    = 0;   // 0=off 1=crash 2=letter
let s2timer    = 0;

let typing     = false;
let typeText   = '';

let dlgLines   = [];
let dlgOpen    = false;

let glitch     = false;
let gTimer     = 0;  // seconds, counts down from 40

let winScroll  = 0;

let frame      = 0;  // always increments

// Villager NPCs (village room)
const npcs = [
  { x:58,  y:162, d:1,  sp:.38, sh:'#cc4433', sk:'#f0b870' },
  { x:108, y:157, d:-1, sp:.33, sh:'#3366cc', sk:'#d4a060' },
  { x:195, y:162, d:1,  sp:.36, sh:'#339944', sk:'#f0c080' },
  { x:255, y:157, d:-1, sp:.41, sh:'#993399', sk:'#e8b870' },
];

// ════════════════════════════════════════════════════════
//  DRAW HELPERS
// ════════════════════════════════════════════════════════
const r = (x,y,w,h,c)=>{ cx.fillStyle=c; cx.fillRect(x|0,y|0,w|0,h|0); };
const dot = (gx,gy,c)=>{ cx.fillStyle=c; cx.fillRect(gx*P,gy*P,P,P); };

function tx(s,x,y,col='#ddd',sz=8){
  cx.font=`bold ${sz}px "Courier New",monospace`;
  cx.textAlign='left';
  cx.fillStyle='rgba(0,0,0,0.9)';
  cx.fillText(s,(x+1)|0,(y+1)|0);
  cx.fillStyle=col;
  cx.fillText(s,x|0,y|0);
}
function txC(s,y,col='#ddd',sz=8){
  cx.font=`bold ${sz}px "Courier New",monospace`;
  cx.textAlign='center';
  cx.fillStyle='rgba(0,0,0,0.9)';
  cx.fillText(s,W/2+1,(y+1)|0);
  cx.fillStyle=col;
  cx.fillText(s,W/2,y|0);
  cx.textAlign='left';
}

function skyGrad(c1,c2){
  const g=cx.createLinearGradient(0,0,0,H*.65);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
}
function drawStars(){
  const v=[17,31,47,61,79,97,113,127,137,149,163,179,193,211,229,241];
  v.forEach((s,i)=>{
    cx.globalAlpha=.35+Math.abs(Math.sin(frame*.04+i*.5))*.4;
    cx.fillStyle='#fff';
    cx.fillRect((s*23+i*11)%W,(s*13+i*7)%95,1,1);
  });
  cx.globalAlpha=1;
}
function moon(x,y){
  cx.fillStyle='#ddeeff'; cx.beginPath(); cx.arc(x,y,15,0,Math.PI*2); cx.fill();
  cx.fillStyle='#inherit'; // overwritten below
}

function lighten(h){
  const v=parseInt(h.slice(1),16);
  return '#'+[((v>>16)&255)+35,((v>>8)&255)+35,(v&255)+35].map(c=>Math.min(255,c).toString(16).padStart(2,'0')).join('');
}
function darken(h){
  const v=parseInt(h.slice(1),16);
  return '#'+[((v>>16)&255)-35,((v>>8)&255)-35,(v&255)-35].map(c=>Math.max(0,c).toString(16).padStart(2,'0')).join('');
}

// ════════════════════════════════════════════════════════
//  SPRITE: KING  (origin: bottom-center)
// ════════════════════════════════════════════════════════
function drawKing(bx,by){
  // bx,by = bottom-center feet position
  const ox = bx - 8*P;  // left edge
  const oy = by - 22*P; // top edge (22 rows tall)
  function lp(lx,ly,c){ cx.fillStyle=c; cx.fillRect(ox+lx*P,oy+ly*P,P,P); }

  // shadow
  cx.fillStyle='rgba(0,0,0,.3)'; cx.beginPath();
  cx.ellipse(bx,by+1,11,3,0,0,Math.PI*2); cx.fill();

  // boots
  const bt='#1a0800';
  [3,4,5,6,7,8,9,10].forEach(x=>lp(x,21,bt));
  [3,4,5,6,7,8,9,10].forEach(x=>lp(x,22,bt));

  // legs
  [4,5].forEach(x=>[18,19,20].forEach(y=>lp(x,y,'#3a1000')));
  [8,9].forEach(x=>[18,19,20].forEach(y=>lp(x,y,'#3a1000')));

  // robe
  const ro='#cc1a1a', rD='#881212', rL='#ee3333';
  for(let ry=11;ry<=17;ry++) for(let rx=2;rx<=12;rx++) lp(rx,ry,ro);
  for(let ry=11;ry<=17;ry++){ lp(2,ry,rD); lp(12,ry,rD); lp(3,ry,rL); }
  // arms
  [[1,12],[0,13],[0,14],[0,15],[1,16]].forEach(([x,y])=>lp(x,y,ro));
  [[13,12],[14,13],[14,14],[14,15],[13,16]].forEach(([x,y])=>lp(x,y,ro));
  // collar
  for(let rx=3;rx<=11;rx++) lp(rx,10,rD);
  for(let rx=4;rx<=10;rx++) lp(rx,11,'#aa1818');

  // neck
  [5,6,7].forEach(x=>lp(x,9,'#f0c080'));

  // head
  const sk='#f0c080', skD='#d4a060';
  for(let hx=4;hx<=10;hx++) for(let hy=2;hy<=8;hy++) lp(hx,hy,sk);
  lp(4,5,skD); lp(10,5,skD); // ear shading
  lp(5,4,'#000'); lp(8,4,'#000'); // eyes
  lp(6,7,skD); lp(7,7,skD); // mouth

  // crown base
  const cr='#ffd700', crD='#bb9900';
  for(let cx2=4;cx2<=10;cx2++) lp(cx2,1,cr);
  for(let cx2=4;cx2<=10;cx2++) lp(cx2,2,crD);
  // crown spikes
  lp(4,-1,cr); lp(5,-1,cr);
  lp(7,-3,cr); lp(7,-2,cr); lp(7,-1,cr); // center spike
  lp(9,-1,cr); lp(10,-1,cr);
  lp(7,-4,'#ffffff'); // jewel

  // staff
  const t=frame*.06;
  for(let sy=-5;sy<=20;sy++) lp(15,sy,'#8B5a20');
  lp(16,-4,'#8B5a20');
  // orb glow
  cx.globalAlpha=.25+Math.sin(t)*.18;
  cx.fillStyle='#00ffaa';
  cx.beginPath(); cx.arc(ox+15.5*P, oy-5*P, 11, 0, Math.PI*2); cx.fill();
  cx.globalAlpha=1;
  // orb core
  [[14,-7,'#00cc88'],[15,-7,'#aaffee'],[16,-7,'#00cc88'],
   [14,-6,'#00ffaa'],[15,-6,'#ffffff'],[16,-6,'#00ffaa'],
   [14,-5,'#00cc88'],[15,-5,'#00ffaa'],[16,-5,'#00cc88']].forEach(([x,y,c])=>lp(x,y,c));
}

// ════════════════════════════════════════════════════════
//  SPRITE: CHILD
// ════════════════════════════════════════════════════════
function drawChild(bx,by){
  const ox=bx-6*P, oy=by-18*P;
  function lp(lx,ly,c){ cx.fillStyle=c; cx.fillRect(ox+lx*P,oy+ly*P,P,P); }
  cx.fillStyle='rgba(0,0,0,.28)'; cx.beginPath(); cx.ellipse(bx,by+2,8,2,0,0,Math.PI*2); cx.fill();
  // hair
  [2,3,4,5,6,7,8,9].forEach(x=>lp(x,0,'#664422'));
  [1,2,9,10].forEach(x=>lp(x,1,'#664422'));
  // head
  for(let hx=2;hx<=9;hx++) for(let hy=1;hy<=7;hy++) lp(hx,hy,'#f0c080');
  lp(3,4,'#000'); lp(7,4,'#000');
  lp(5,6,'#cc9966'); lp(6,6,'#cc9966');
  // body
  const sh='#4488dd';
  for(let bx2=2;bx2<=9;bx2++) for(let by2=8;by2<=13;by2++) lp(bx2,by2,sh);
  [[1,9],[0,10],[0,11],[0,12],[10,9],[11,10],[11,11],[11,12]].forEach(([x,y])=>lp(x,y,sh));
  // legs
  const p2='#224466';
  [3,4].forEach(x=>[14,15,16,17].forEach(y=>lp(x,y,p2)));
  [7,8].forEach(x=>[14,15,16,17].forEach(y=>lp(x,y,p2)));
}

// ════════════════════════════════════════════════════════
//  SPRITE: FOX
// ════════════════════════════════════════════════════════
function drawFox(bx,by){
  const ox=bx-8*P, oy=by-20*P;
  function lp(lx,ly,c){ cx.fillStyle=c; cx.fillRect(ox+lx*P,oy+ly*P,P,P); }
  cx.fillStyle='rgba(0,0,0,.28)'; cx.beginPath(); cx.ellipse(bx,by+2,10,3,0,0,Math.PI*2); cx.fill();
  const fo='#cc5500', fD='#993300', fL='#ffddaa';
  // tail
  [[13,14,fo],[14,13,fo],[15,12,fo],[16,12,fo],[14,15,fD],[15,14,fD],[14,14,fL]].forEach(([x,y,c])=>lp(x,y,c));
  // ears
  lp(2,0,fo); lp(3,-1,fo); lp(4,-2,fo); lp(3,0,fo); lp(3,1,fo);
  lp(9,0,fo); lp(10,-1,fo); lp(10,0,fo); lp(10,1,fo); lp(11,0,fo);
  lp(3,-1,'#ff9966'); lp(10,-1,'#ff9966');
  // head
  for(let hx=2;hx<=11;hx++) for(let hy=0;hy<=8;hy++) lp(hx,hy,fo);
  for(let sx=1;sx<=5;sx++) for(let sy=5;sy<=8;sy++) lp(sx,sy,fL);
  lp(2,5,fo); lp(2,8,fo); lp(3,7,'#330000');
  lp(6,3,'#000'); lp(7,3,'#000'); lp(9,3,'#000'); lp(10,3,'#000');
  lp(6,4,'#553300'); lp(10,4,'#553300');
  // body
  for(let bx2=1;bx2<=12;bx2++) for(let by2=9;by2<=17;by2++) lp(bx2,by2,fo);
  for(let bx2=3;bx2<=9;bx2++) for(let by2=12;by2<=16;by2++) lp(bx2,by2,fL);
  [2,3].forEach(x=>[18,19,20].forEach(y=>lp(x,y,fD)));
  [9,10].forEach(x=>[18,19,20].forEach(y=>lp(x,y,fD)));
}

// ════════════════════════════════════════════════════════
//  SPRITE: DINO  (hidden behind right house)
// ════════════════════════════════════════════════════════
function drawDino(bx,by){
  const ox=bx-9*P, oy=by-22*P;
  function lp(lx,ly,c){ cx.fillStyle=c; cx.fillRect(ox+lx*P,oy+ly*P,P,P); }
  cx.fillStyle='rgba(0,0,0,.28)'; cx.beginPath(); cx.ellipse(bx,by+2,11,3,0,0,Math.PI*2); cx.fill();
  const g1='#227733', g2='#1a5522', g3='#33aa44';
  // tail
  [[13,14,g1],[14,13,g1],[15,12,g1],[16,12,g1],[14,15,g2],[15,14,g2]].forEach(([x,y,c])=>lp(x,y,c));
  // spines
  [2,4,6,8,10].forEach(x=>{ lp(x,5,g2); lp(x,4,g2); });
  // head
  for(let hx=0;hx<=10;hx++) for(let hy=2;hy<=11;hy++) lp(hx,hy,g1);
  // jaw/teeth
  lp(0,9,g2); lp(0,10,g2); lp(0,11,'#ffee88'); lp(1,11,g2);
  // eye
  lp(6,5,'#ffd700'); lp(7,5,'#ffd700'); lp(6,6,'#000'); lp(7,6,'#222');
  // body
  for(let bx2=1;bx2<=14;bx2++) for(let by2=12;by2<=20;by2++) lp(bx2,by2,g1);
  for(let bx2=1;bx2<=14;bx2++) lp(bx2,12,g3);
  // legs
  [3,4].forEach(x=>[21,22,23].forEach(y=>lp(x,y,g2)));
  [9,10].forEach(x=>[21,22,23].forEach(y=>lp(x,y,g2)));
}

// ════════════════════════════════════════════════════════
//  SPRITE: GENERIC NPC
// ════════════════════════════════════════════════════════
function drawNPC(bx,by,shirt,skin){
  const ox=bx-5*P, oy=by-16*P;
  function lp(lx,ly,c){ cx.fillStyle=c; cx.fillRect(ox+lx*P,oy+ly*P,P,P); }
  cx.fillStyle='rgba(0,0,0,.22)'; cx.beginPath(); cx.ellipse(bx,by+2,7,2,0,0,Math.PI*2); cx.fill();
  [2,3,4,5,6,7].forEach(x=>lp(x,0,'#443322')); // hair
  for(let hx=2;hx<=7;hx++) for(let hy=1;hy<=6;hy++) lp(hx,hy,skin);
  lp(3,3,'#000'); lp(6,3,'#000');
  for(let bx2=1;bx2<=8;bx2++) for(let by2=7;by2<=12;by2++) lp(bx2,by2,shirt);
  [[0,8],[0,9],[0,10],[9,8],[9,9],[9,10]].forEach(([x,y])=>lp(x,y,shirt));
  [2,3].forEach(x=>[13,14,15].forEach(y=>lp(x,y,'#1a1a33')));
  [6,7].forEach(x=>[13,14,15].forEach(y=>lp(x,y,'#1a1a33')));
}

// ════════════════════════════════════════════════════════
//  SPRITE: SPIDER (big, king-sized, red = The Virus)
// ════════════════════════════════════════════════════════
function drawSpider(bx,by,glitchIt){
  const ox=bx-14*P, oy=by-14*P;
  function lp(lx,ly,c){ cx.fillStyle=c; cx.fillRect(ox+lx*P,oy+ly*P,P,P); }
  const bob=Math.sin(frame*.08)*2;
  const r1='#cc0000', r2='#880000', r3='#ff2222', w='#ffeeee';
  // glitch color override
  const gc1=glitchIt?`hsl(${(frame*20)%360},100%,50%)`:r1;
  const gc2=glitchIt?`hsl(${(frame*20+120)%360},100%,40%)`:r2;
  // LEGS (4 each side) - animated
  const legWave=Math.sin(frame*.12)*2;
  [[-5,4],[-7,6],[-6,10],[-4,13]].forEach(([lx,ly],i)=>{
    const wave=(i%2===0?legWave:-legWave);
    lp(lx,ly+wave|0,gc2); lp(lx-1,ly+1+wave|0,gc2); lp(lx-2,ly+2+wave|0,gc2);
  });
  [[19,4],[21,6],[20,10],[18,13]].forEach(([lx,ly],i)=>{
    const wave=(i%2===0?legWave:-legWave);
    lp(lx,ly+wave|0,gc2); lp(lx+1,ly+1+wave|0,gc2); lp(lx+2,ly+2+wave|0,gc2);
  });
  // BODY (abdomen)
  for(let bx2=3;bx2<=18;bx2++) for(let by2=8;by2<=18;by2++) lp(bx2,by2,gc1);
  for(let bx2=4;bx2<=17;bx2++){ lp(bx2,8,r3); lp(bx2,7,r2); }
  for(let bx2=3;bx2<=18;bx2++) lp(bx2,8,r3);
  // hourglass marking
  for(let bx2=8;bx2<=14;bx2++) for(let by2=10;by2<=16;by2++) lp(bx2,by2,r2);
  lp(9,12,w); lp(12,12,w); lp(10,13,w); lp(11,13,w);
  // HEAD
  for(let bx2=5;bx2<=16;bx2++) for(let by2=1;by2<=7;by2++) lp(bx2,by2,gc1);
  // eyes - glowing
  [[6,3,'#ff6666'],[8,3,'#ff6666'],[13,3,'#ff6666'],[15,3,'#ff6666'],
   [7,3,'#ffffff'],[14,3,'#ffffff']].forEach(([ex,ey,ec])=>lp(ex,ey,ec));
  // fangs
  lp(8,8,r3); lp(9,8,w); lp(12,8,w); lp(13,8,r3);
  // eye glow
  if(!glitchIt){
    cx.fillStyle='rgba(255,0,0,0.25)';
    cx.beginPath(); cx.arc(ox+7*P,oy+3*P,6,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(ox+14*P,oy+3*P,6,0,Math.PI*2); cx.fill();
  }
}

// ════════════════════════════════════════════════════════
//  DRAW: SWORD on king's hand
// ════════════════════════════════════════════════════════
function drawSword(bx,by,raised){
  // raised=0 carried at side, raised=1 held up
  const angle = raised ? -Math.PI/2 : -Math.PI/5;
  const hx = (bx+12)|0, hy = (by-18)|0;
  cx.save(); cx.translate(hx,hy); cx.rotate(angle);
  // blade
  cx.fillStyle='#ddddff'; cx.fillRect(-2,-28,4,28);
  cx.fillStyle='#ffffff'; cx.fillRect(-1,-28,2,28);
  // guard
  cx.fillStyle='#cc9900'; cx.fillRect(-7,-4,14,4);
  cx.fillStyle='#ffdd00'; cx.fillRect(-6,-4,2,4); cx.fillRect(5,-4,2,4);
  // hilt
  cx.fillStyle='#884400'; cx.fillRect(-2,0,4,10);
  cx.fillStyle='#cc6600'; cx.fillRect(-1,0,2,10);
  // pommel
  cx.fillStyle='#cc9900'; cx.fillRect(-3,10,6,4);
  cx.restore();
}

// ════════════════════════════════════════════════════════
//  ROOM: SPIDER DEN (secret hidden area behind circus)
// ════════════════════════════════════════════════════════
function roomSpiderDen(){
  r(0,0,W,H,'#080000');
  // cracked walls
  for(let i=0;i<16;i++){
    cx.strokeStyle=`rgba(100,0,0,${.08+i*.01})`; cx.lineWidth=.5;
    const sx=(i*47+13)%W;
    cx.beginPath(); cx.moveTo(sx,0); cx.lineTo(sx+8,40+i*10); cx.stroke();
  }
  // floor
  r(0,170,W,H-170,'#100000'); r(0,170,W,2,'#330000');
  for(let x=0;x<W;x+=8){ cx.strokeStyle='rgba(80,0,0,.1)'; cx.lineWidth=.5; cx.beginPath(); cx.moveTo(x,170); cx.lineTo(x,H); cx.stroke(); }
  // webs in corners
  for(let i=0;i<6;i++){
    cx.strokeStyle=`rgba(180,180,180,${.15+i*.02})`; cx.lineWidth=.5;
    cx.beginPath(); cx.moveTo(0,i*14); cx.lineTo(i*18,0); cx.stroke();
    cx.beginPath(); cx.moveTo(W,i*14); cx.lineTo(W-i*18,0); cx.stroke();
  }
  // red glow from spider
  if(spiderAlive){
    const g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,80);
    g.addColorStop(0,'rgba(120,0,0,.3)'); g.addColorStop(1,'transparent');
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
  }

  // FIGHT ANIMATION
  if(fightAnim>0){
    const f=fightAnim;
    if(f<35){
      // phase 1: king walks toward spider
      const kx=Math.min(155, 60+f*3);
      drawKing(kx,180); drawSword(kx,180,0);
      drawSpider(210,180,false);
    } else if(f<60){
      // phase 2: raise sword
      drawKing(155,180); drawSword(155,180,1);
      drawSpider(210,180,false);
    } else if(f<85){
      // phase 3: slash - spider starts glitching
      drawKing(155,180); drawSword(155,180,1);
      drawSpider(210,180,true);
      // slash line
      cx.strokeStyle='rgba(255,255,255,0.8)'; cx.lineWidth=3;

    cx.moveTo(bx+Math.cos(Math.PI*(1+f))*W2,gy);

    cx.lineTo(bx,gy-78);

// ── LETTER SCROLL STATE ──────────────────────────────────
let letterScroll = 0;
let letterTouchY = 0;

function letterScrollBy(amt){
  letterScroll = Math.max(0, letterScroll + amt);
}

// hook wheel on canvas for letter screen
gc.addEventListener('wheel', e=>{
  if(s2phase===2){ letterScrollBy(e.deltaY > 0 ? 14 : -14); e.preventDefault(); }
}, {passive:false});

// touch drag for letter
gc.addEventListener('touchstart', e=>{
  if(s2phase===2){ letterTouchY = e.touches[0].clientY; e.preventDefault(); }
}, {passive:false});
gc.addEventListener('touchmove', e=>{
  if(s2phase!==2) return;
  e.preventDefault();
  const dy = letterTouchY - e.touches[0].clientY;
  letterTouchY = e.touches[0].clientY;
  letterScrollBy(dy / SC);
}, {passive:false});

//  GLITCH FX
// ════════════════════════════════════════════════════════
function applyGlitch(){
  const it=Math.min(1,(40-gTimer)/14);
  cx.save();
  try{
    for(let i=0;i<4+Math.floor(it*8);i++){
      const sy=(Math.random()*H)|0, sh=Math.max(1,(Math.random()*15*it)|0);
      const sx=((Math.random()-.5)*18*it)|0;
      if(sy+sh<=H){ const d=cx.getImageData(0,sy,W,sh); cx.putImageData(d,sx,sy); }
    }
  }catch(e){}
  if(Math.random()<.28*it) r(0,(Math.random()*H)|0,W,2,`rgba(255,0,200,${.1+Math.random()*.14})`);
  if(Math.random()<.18*it) r(0,(Math.random()*H)|0,W,1,`rgba(0,220,255,.08)`);
  if(Math.random()<.05){ cx.globalAlpha=.07; r(0,0,W,H,'#ff00cc'); cx.globalAlpha=1; }
  cx.restore();
}

// ════════════════════════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════════════════════════
function interact(){
  if(gs!=='playing') return;
  if(dlgOpen){ dlgOpen=false; dlgLines=[]; return; }
  const px2=pl.x, py2=pl.y;

  // PARTY – place items at table
  if(room==='party'){
    if(itBalloons&&itConfetti&&itCake){
      if(py2>126&&py2<166&&px2>22&&px2<298){ gs='win'; winScroll=0; return; }
    } else {
      dlgLines=['Faltam itens para a festa!','Precisa: balões, confettis e bolo.']; dlgOpen=true;
    }
  }

  // CIRCUS – balloons (player enters from RIGHT at x≈308, walks LEFT)
  if(room==='circus'&&!itBalloons){
    if(px2<115&&py2>118){
      itBalloons=true; dlgLines=['Apanhaste os balões! 🎈','(1 de 3 itens)']; dlgOpen=true;
    }
  }

  // CHILD HOUSE – start typing
  if(room==='child_house'&&!childGone&&!typing){
    if(Math.abs(px2-86)<52&&Math.abs(py2-172)<42){ typing=true; typeText=''; }
  }

  // MINE – confetti (player enters from RIGHT at x≈308, walks LEFT to x=52)
  if(room==='mine'&&!itConfetti){
    if(px2<80&&py2>H-65){
      itConfetti=true; dlgLines=['Apanhaste os confettis! 🎊','(2 de 3 itens)']; dlgOpen=true;
    }
  }

  // VILLAGE – fox
  if(room==='village'){
    if(Math.abs(px2-264)<42&&Math.abs(py2-170)<38){
      if(glitch&&!hasSword&&foxDone){
        // secret: give sword during glitch
        hasSword=true;
        dlgLines=['A Raposa diz:','"Seremos para sempre amigos."','A Raposa deu-te uma espada! ⚔']; dlgOpen=true;
      } else if(!foxDone){
        foxDone=true; itCake=true;
        dlgLines=['A Raposa diz:','"Seremos amigos para sempre!"','Recebeste o bolo! 🎂','(3 de 3 itens)']; dlgOpen=true;
      }
    }
  }

  // VILLAGE – dino (far right)
  if(room==='village'&&pl.x>=272){
    if(Math.abs(px2-296)<32&&Math.abs(py2-190)<34){
      dlgLines=['Vestígio de Dinossauro:','"Diz à criança que ela é um Vir##"']; dlgOpen=true;
    }
  }

  // SPIDER DEN – attack spider
  if(room==='spider_den'&&spiderAlive&&fightAnim===0){
    if(hasSword&&Math.abs(px2-210)<45&&Math.abs(py2-(H-45))<40){
      fightAnim=1; // start animation
    } else if(!hasSword&&Math.abs(px2-210)<45&&Math.abs(py2-(H-45))<40){
      dlgLines=['Precisas de uma arma para','derrotar o Vírus!']; dlgOpen=true;
    }
  }

  // MINE – glitch door
  if(room==='mine'&&glitch){
    if(Math.abs(px2-160)<22&&Math.abs(py2-(H-60))<30){ gs='secret'; }
  }
}

function submitTyping(){
  const t=typeText.trim(); if(!t){ typing=false; return; }
  childEcho=t; echoTimer=6; typeText=''; typing=false;
  if(t.toLowerCase().includes('virus')){
    childGone=true; childEcho=''; echoTimer=0;
    setTimeout(()=>{ glitch=true; gTimer=25; },900);
  }
}

function gotoRoom(newRoom,sx,sy){
  room=newRoom; pl.x=sx; pl.y=sy;
  dlgOpen=false; dlgLines=[]; typing=false; childEcho='';
}

function checkTransitions(){
  const px2=pl.x, py2=pl.y;
  if(room==='hub'){
    if(py2<=1&&px2>128&&px2<192)     gotoRoom('party',       160,H-14);
    if(py2>=H-1&&px2>128&&px2<192)   gotoRoom('corridor',    160,120);
    if(px2<=1&&py2>104&&py2<156)     gotoRoom('mine',        W-12,130);
    if(px2>=W-1&&py2>104&&py2<156)   gotoRoom('village',     12,140);
  }else if(room==='party'){
    if(py2>=H-1&&px2>128&&px2<192)   gotoRoom('hub',         160,12);
  }else if(room==='corridor'){
    if(py2<=118&&px2>128&&px2<192)   gotoRoom('hub',         160,H-12);
    if(px2<=1&&py2>110)              gotoRoom('circus',      W-12,160);
    if(px2>=W-1&&py2>110)            gotoRoom('child_house', 12,160);
  }else if(room==='circus'){
    if(px2>=W-1&&py2>110)            gotoRoom('corridor',    12,160);
    if(glitch&&px2<=2&&py2>185)      gotoRoom('spider_den',  30,185);
  }else if(room==='spider_den'){
    if(px2<=10&&py2>155)             gotoRoom('circus',      18,160);
  }else if(room==='child_house'){
    if(px2<=1&&py2>110)              gotoRoom('corridor',    W-12,160);
  }else if(room==='mine'){
    if(px2>=W-1&&py2>104&&py2<156)   gotoRoom('hub',         12,130);
  }else if(room==='village'){
    if(px2<=1&&py2>104&&py2<162)     gotoRoom('hub',         W-12,130);
  }
}

function wallBlock(x,y){
  if(room==='party')       return y<128;
  if(room==='corridor')    return y<116;
  if(room==='circus'){
    // bottom-left corner passable during glitch
    if(glitch&&x<20&&y>185) return false;
    return y<144;
  }
  if(room==='spider_den')  return y<155;
  if(room==='child_house') return y<126||(x>178&&x<268&&y>146&&y<180);
  if(room==='mine')        return y<82;
  if(room==='village')     return y<108||(x>10&&x<72&&y>150&&y<188)||(x>130&&x<192&&y>150&&y<188)||(x>254&&x<314&&y>150&&y<188);
  return false;
}

// ════════════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════════════
const keys = {};

window.addEventListener('keydown',e=>{
  if(s2phase===2){
    if(e.key==='ArrowDown'||e.key==='PageDown') letterScrollBy(18);
    if(e.key==='ArrowUp'  ||e.key==='PageUp')   letterScrollBy(-18);
    e.preventDefault(); return;
  }
  if(typing){
    if(e.key==='Enter')     { submitTyping(); }
    else if(e.key==='Backspace'){ typeText=typeText.slice(0,-1); }
    else if(e.key.length===1&&typeText.length<30){ typeText+=e.key; }
    e.preventDefault(); return;
  }
  const was=keys[e.code]; keys[e.code]=true;
  if(!was) keyPress(e.code);
  e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.code]=false; });

function keyPress(code){
  if(gs==='title'&&(code==='Enter'||code==='Space')){ gs='intro'; return; }
  if(gs==='intro'&&(code==='Enter'||code==='Space')){ gs='playing'; return; }
  if(gs==='win'||gs==='secret') return;
  if(dlgOpen){ dlgOpen=false; dlgLines=[]; return; }
  if(code==='KeyE') interact();
}

// ════════════════════════════════════════════════════════
//  MOBILE INPUT
// ════════════════════════════════════════════════════════
const jzone=document.getElementById('jzone');
const jknob=document.getElementById('jknob');
const bE=document.getElementById('bE');
const mobEl=document.getElementById('mob');
let joy={on:false,id:-1,cx2:59,cy2:59,nx:0,ny:0};

jzone.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0], rec=jzone.getBoundingClientRect();
  joy={on:true,id:t.identifier,cx2:rec.left+59,cy2:rec.top+59,nx:0,ny:0};
  jknob.style.left='35px'; jknob.style.top='35px';
},{passive:false});
jzone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joy.id) continue;
    let dx=t.clientX-joy.cx2, dy=t.clientY-joy.cy2;
    const d=Math.sqrt(dx*dx+dy*dy), mx=48;
    if(d>mx){dx=dx/d*mx; dy=dy/d*mx;}
    joy.nx=dx/mx; joy.ny=dy/mx;
    jknob.style.left=(35+joy.nx*28)+'px'; jknob.style.top=(35+joy.ny*28)+'px';
  }
},{passive:false});
function jReset(){ joy.on=false; joy.nx=0; joy.ny=0; jknob.style.left='35px'; jknob.style.top='35px'; }
jzone.addEventListener('touchend',e=>{ e.preventDefault(); jReset(); },{passive:false});
jzone.addEventListener('touchcancel',e=>{ e.preventDefault(); jReset(); },{passive:false});

bE.addEventListener('touchstart',e=>{
  e.preventDefault(); bE.classList.add('on');
  if(typing){ submitTyping(); return; }
  if(gs==='title'){ gs='intro'; return; }
  if(gs==='intro'){ gs='playing'; return; }
  if(dlgOpen){ dlgOpen=false; dlgLines=[]; return; }
  if(gs==='playing') interact();
},{passive:false});
bE.addEventListener('touchend',e=>{ e.preventDefault(); bE.classList.remove('on'); },{passive:false});

gc.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(gs==='title'){ gs='intro'; return; }
  if(gs==='intro'){ gs='playing'; return; }
  if(dlgOpen){ dlgOpen=false; dlgLines=[]; return; }
},{passive:false});

// ════════════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════════════
let lastT=0;
function update(dt){
  frame++;

  // secret2 phase timer — must run regardless of gs
  if(s2phase===1){
    s2timer-=dt;
    if(s2timer<=0){ s2phase=2; winScroll=0; letterScroll=0; }
  }

  if(gs!=='playing') return;

  // timers
  if(glitch&&gTimer>0&&fightAnim===0){ gTimer-=dt; if(gTimer<=0){ gTimer=0; glitch=false; gs='crash'; } }
  if(echoTimer>0) echoTimer-=dt;

  // fight animation
  if(fightAnim>0){
    fightAnim++;
    if(fightAnim===90) spiderAlive=false;
    if(fightAnim===116){
      fightAnim=0;
      s2phase=1; s2timer=5;
    }
  }

  // NPC wander
  npcs.forEach(n=>{ n.x+=n.sp*n.d; if(n.x<16||n.x>306) n.d*=-1; });

  if(typing||dlgOpen) return;

  // movement
  let dx=0, dy=0;
  if(keys['ArrowLeft'] ||keys['KeyA']) dx-=pl.sp;
  if(keys['ArrowRight']||keys['KeyD']) dx+=pl.sp;
  if(keys['ArrowUp']   ||keys['KeyW']) dy-=pl.sp;
  if(keys['ArrowDown'] ||keys['KeyS']) dy+=pl.sp;
  if(joy.on){
    const dead=.14;
    if(Math.abs(joy.nx)>dead) dx+=joy.nx*pl.sp;
    if(Math.abs(joy.ny)>dead) dy+=joy.ny*pl.sp;
  }
  if(dx!==0&&dy!==0){ dx*=.707; dy*=.707; }

  const nx=Math.max(1,Math.min(W-1,pl.x+dx));
  const ny=Math.max(1,Math.min(H-1,pl.y+dy));
  if(!wallBlock(nx,ny))          { pl.x=nx; pl.y=ny; }
  else if(!wallBlock(nx,pl.y))   { pl.x=nx; }
  else if(!wallBlock(pl.x,ny))   { pl.y=ny; }

  checkTransitions();
}

// ════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05); lastT=ts;
  cx.clearRect(0,0,W,H);
  update(dt);

  if(s2phase===1)          { screenCrash(); }
  else if(s2phase===2)     { screenLetter(); }
  else if(gs==='title')    { screenTitle(); }
  else if(gs==='intro')    { screenIntro(); }
  else if(gs==='win')      { screenWin(); }
  else if(gs==='secret')   { screenSecret(); }
  else if(gs==='crash')    { screenCrash(); }
  else { // playing
    switch(room){
      case 'hub':         roomHub();       break;
      case 'party':       roomParty();     break;
      case 'corridor':    roomCorridor();  break;
      case 'circus':      roomCircus();    break;
      case 'child_house': roomChildHouse();break;
      case 'mine':        roomMine();      break; // draws king internally
      case 'village':     roomVillage();   break;
      case 'spider_den':  roomSpiderDen(); break; // draws king internally
    }
    if(room!=='mine'&&room!=='spider_den'){ drawKing(pl.x,pl.y); if(hasSword) drawSword(pl.x,pl.y,0); }
    if(dlgOpen) drawDialog(dlgLines);
    drawHUD();
    if(glitch) applyGlitch();
  }

  drawCRT();
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
</script>
