<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MINI GAME — Edição Especial</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: pan-x pan-y; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; cursor: none; }
.mobile-controls { position: fixed; z-index: 10; display: none; }
#joystickCanvas { bottom: 25px; left: 25px; width: 130px; height: 130px; background: rgba(0,0,0,0.6); border-radius: 50%; backdrop-filter: blur(4px); touch-action: none; cursor: pointer; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
#enterButton { bottom: 25px; right: 25px; width: 70px; height: 70px; background: rgba(180,30,30,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Courier New', monospace; font-weight: bold; font-size: 28px; color: white; text-shadow: 0 0 5px rgba(0,0,0,0.5); cursor: pointer; box-shadow: 0 0 15px rgba(255,0,0,0.5); backdrop-filter: blur(4px); border: 2px solid #ff8888; transition: transform 0.1s ease, background 0.1s ease; touch-action: manipulation; }
#enterButton:active { transform: scale(0.92); background: rgba(220,50,50,0.9); }
@media (max-width: 700px) { #joystickCanvas { width: 100px; height: 100px; bottom: 15px; left: 15px; } #enterButton { width: 60px; height: 60px; font-size: 24px; bottom: 15px; right: 15px; } }
@media (hover: hover) and (pointer: fine) { .mobile-controls { display: none !important; } }
.modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  display: none;
  justify-content: center;
  align-items: center;
  font-family: monospace;
}
.modal-content {
  background: #1a0a0a;
  border: 2px solid #a33;
  border-radius: 8px;
  width: 90%;
  max-width: 800px;
  max-height: 80%;
  overflow: auto;  /* permite scroll */
  padding: 15px;
  color: #faa;
  font-size: 12px;
  white-space: pre-wrap;
  box-shadow: 0 0 20px rgba(255,0,0,0.5);
}
.modal-content pre {
  margin: 0;
  font-family: monospace;
  font-size: 11px;
  line-height: 1.4;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.close-modal {
  position: sticky;
  top: 0;
  background: #3a1515;
  padding: 5px;
  text-align: right;
  cursor: pointer;
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>
<body>
<canvas id="c" width="800" height="450"></canvas>
<div class="mobile-controls" id="mobileControls">
  <canvas id="joystickCanvas" width="200" height="200"></canvas>
  <div id="enterButton">↵</div>
</div>
<div id="scriptModal" class="modal">
  <div class="modal-content">
    <div class="close-modal">[ X ] FECHAR</div>
    <pre id="scriptCode"></pre>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = 800, H = 450;

const isMobile = ('ontouchstart' in window) && (window.innerWidth <= 768);
const mobileControls = document.getElementById('mobileControls');
if (isMobile) mobileControls.style.display = 'block';
else mobileControls.style.display = 'none';

const keys = {};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Enter'&&gameState==='TITLE'){ gameState='PLAYING'; loadRoom(0); }
  if((e.key==='r'||e.key==='R')&&gameState==='CRASH'){ gameState='TITLE'; frameCount=0; }
  e.preventDefault();
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

let gameState  = 'TITLE';
let lastTime   = 0;
let frameCount = 0;
let animTimer  = 0;
let animFrame  = 0;

let player = { x:38, y:210, w:14, h:20, speed:2.6, facing:1 };
let playerDead  = false;
let deathTimer  = 0;
let deathParts  = [];
let currentRoomIdx = 0;
let roomEnemies    = [];
let roomObstacles  = [];

let secretTriggered = false;
let parkourTransitionActive = false;
let parkourTransitionTimer = 0;

let tableRoomState = {
  playerX: 60, playerY: 295,
  playerFacing: 1,
  scriptRead: false,
  nearTable: false,
  promptAlpha: 0
};

let parkour = {
  active: false,
  x: 100, y: 300,
  vx: 0, vy: 0,
  onGround: true,
  w: 16, h: 20,
  platforms: [],
  currentPlatform: 0,
  platformCounter: 0,
  effectIndex: 0,
  effectTimer: 0,
  effectActive: false,
  finalTable: null,
  showTable: false,
  completed: false
};
let currentEffect = null;
let shakeOffset = { x: 0, y: 0 };
const GRAVITY = 0.48;
const JUMP_POWER = -7.6;
const MAX_SPEED = 3.8;

function loadImageAsync(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}
let virusImg = null;
loadImageAsync('virus.png').then(img => { virusImg = img; });

const B = 22;
function bord() { return [ {x:0,y:0,w:W,h:B}, {x:0,y:H-B,w:W,h:B}, {x:0,y:0,w:B,h:H}, {x:W-B,y:0,w:B,h:H} ]; }
function pillar(cx, gapCY, gapH) { const top = gapCY - gapH/2, bot = gapCY + gapH/2; return [ {x:cx,y:B,w:20,h:top-B}, {x:cx,y:bot,w:20,h:H-B-bot} ]; }
function hdiv(y, th, gaps) { let segs = [], cur = B; for (const g of [...gaps].sort((a,b)=>a.x-b.x)) { if(g.x>cur) segs.push({x:cur,y,w:g.x-cur,h:th}); cur=g.x+g.w; } if(cur<W-B) segs.push({x:cur,y,w:W-B-cur,h:th}); return segs; }
const TY=130, MY=290, DH=25;

const ROOMS = [
  { name:'SALA 1', hint:'WASD ou Setas', playerStart:{x:38,y:210}, exit:{x:758,y:170,w:20,h:100},
    walls:[...bord(), ...pillar(260,220,110), ...pillar(540,220,110), {x:B,y:B,w:120,h:20}, {x:640,y:H-B-20,w:120,h:20}], enemies:[], obstacles:[] },
  { name:'SALA 2', hint:'', playerStart:{x:38,y:210}, exit:{x:758,y:170,w:20,h:100},
    walls:[...bord(), ...pillar(210,220,110), ...pillar(420,220,110), ...pillar(620,220,110), {x:B,y:340,w:120,h:20}, {x:660,y:B,w:118,h:20}], enemies:[], obstacles:[] },
  { name:'LABIRINTO 1', hint:'Encontra a saída', playerStart:{x:38,y:210}, exit:{x:758,y:40,w:20,h:90},
    walls:[...bord(), ...hdiv(TY,DH,[{x:300,w:65}]), ...hdiv(MY,DH,[{x:480,w:65}]), {x:520,y:TY+DH,w:25,h:MY-(TY+DH)}, {x:B,y:B,w:180,h:TY-B}, {x:450,y:B,w:20,h:65}, {x:200,y:MY+DH,w:20,h:80}], enemies:[], obstacles:[] },
  { name:'LABIRINTO 2', hint:'', playerStart:{x:38,y:210}, exit:{x:758,y:170,w:20,h:100},
    walls:[...bord(), ...hdiv(TY,DH,[{x:300,w:65},{x:580,w:65}]), ...hdiv(MY,DH,[]), {x:440,y:TY+DH,w:25,h:MY-(TY+DH)}, {x:B,y:B,w:200,h:TY-B}, {x:195,y:B,w:20,h:60}, {x:480,y:B,w:20,h:60}, {x:550,y:MY+DH,w:20,h:80}], enemies:[], obstacles:[] },
  { name:'PERIGO 1', hint:'Desvia dos espinhos!', playerStart:{x:38,y:210}, exit:{x:758,y:170,w:20,h:100},
    walls:[...bord(), {x:B,y:165,w:600,h:20}, {x:B,y:265,w:600,h:20}], enemies:[],
    obstacles:[ {x:200,y:B,w:20,h:40,dx:0,dy:2.8,minY:B,maxY:125}, {x:320,y:40,w:20,h:40,dx:0,dy:3.0,minY:B,maxY:125}, {x:440,y:B,w:20,h:40,dx:0,dy:2.5,minY:B,maxY:125}, {x:560,y:50,w:20,h:40,dx:0,dy:3.2,minY:B,maxY:125}, {x:260,y:190,w:20,h:38,dx:0,dy:2.2,minY:190,maxY:240}, {x:480,y:200,w:20,h:38,dx:0,dy:2.6,minY:190,maxY:240}, {x:180,y:285,w:20,h:45,dx:0,dy:2.4,minY:285,maxY:405}, {x:380,y:330,w:20,h:45,dx:0,dy:2.2,minY:285,maxY:405}, {x:580,y:290,w:20,h:45,dx:0,dy:3.0,minY:285,maxY:405} ] },
  { name:'PERIGO 2', hint:'Movimento!', playerStart:{x:38,y:215}, exit:{x:758,y:170,w:20,h:100},
    walls:[...bord(), {x:B,y:195,w:200,h:20}, {x:400,y:195,w:200,h:20}, {x:B,y:235,w:200,h:20}, {x:400,y:235,w:200,h:20}], enemies:[],
    obstacles:[ {x:250,y:B,w:20,h:45,dx:0,dy:3.2,minY:B,maxY:380}, {x:370,y:220,w:20,h:45,dx:0,dy:-3.0,minY:B,maxY:380}, {x:490,y:B,w:20,h:45,dx:0,dy:2.7,minY:B,maxY:380}, {x:610,y:180,w:20,h:45,dx:0,dy:-2.8,minY:B,maxY:380}, {x:700,y:B,w:20,h:45,dx:0,dy:3.5,minY:B,maxY:380}, {x:150,y:320,w:70,h:18,dx:2.2,dy:0,minX:B,maxX:460}, {x:460,y:100,w:70,h:18,dx:-2.0,dy:0,minX:300,maxX:710} ] },
  { name:'PERIGO 3', hint:'', playerStart:{x:38,y:210}, exit:{x:758,y:170,w:20,h:100}, walls:[...bord()], enemies:[],
    obstacles:[ {x:130,y:B,w:16,h:45,dx:0,dy:2.6,minY:B,maxY:360}, {x:210,y:180,w:16,h:45,dx:0,dy:-2.8,minY:B,maxY:360}, {x:290,y:B,w:16,h:45,dx:0,dy:3.0,minY:B,maxY:360}, {x:370,y:200,w:16,h:45,dx:0,dy:-2.7,minY:B,maxY:360}, {x:450,y:B,w:16,h:45,dx:0,dy:2.9,minY:B,maxY:360}, {x:530,y:170,w:16,h:45,dx:0,dy:-3.1,minY:B,maxY:360}, {x:610,y:B,w:16,h:45,dx:0,dy:2.5,minY:B,maxY:360}, {x:690,y:250,w:16,h:45,dx:0,dy:-2.4,minY:B,maxY:360}, {x:100,y:180,w:70,h:16,dx:1.8,dy:0,minX:B,maxX:400}, {x:400,y:340,w:70,h:16,dx:-2.2,dy:0,minX:300,maxX:730}, {x:200,y:80,w:70,h:16,dx:1.6,dy:0,minX:B,maxX:600} ] },
  { name:'FUGA 1', hint:'Não deixes apanhar!', playerStart:{x:38,y:210}, exit:{x:758,y:170,w:20,h:100}, walls:[...bord(), ...pillar(300,220,110), {x:500,y:B,w:20,h:200}], enemies:[{x:620,y:200,w:14,h:20,speed:1.3,alive:true}], obstacles:[] },
  { name:'FUGA 2', hint:'', playerStart:{x:38,y:210}, exit:{x:758,y:170,w:20,h:100}, walls:[...bord(), ...pillar(230,220,110), ...pillar(470,220,110), {x:310,y:300,w:200,h:20}], enemies:[{x:560,y:80,w:14,h:20,speed:1.3,alive:true},{x:690,y:340,w:14,h:20,speed:1.5,alive:true}], obstacles:[] },
  { name:'FUGA 3', hint:'', playerStart:{x:38,y:210}, exit:{x:758,y:170,w:20,h:100}, walls:[...bord(), ...pillar(200,220,110), ...pillar(420,220,110), ...pillar(630,220,110)], enemies:[{x:580,y:310,w:14,h:20,speed:1.3,alive:true},{x:430,y:80,w:14,h:20,speed:1.6,alive:true},{x:720,y:210,w:14,h:20,speed:1.1,alive:true}], obstacles:[] },
  { name:'...', hint:'', playerStart:{x:38,y:210}, exit:{x:W/2-30,y:H/2-30,w:60,h:60}, walls:[...bord()], enemies:[], obstacles:[] }
];

function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function moveX(e,dx,walls){ e.x+=dx; for(const w of walls) if(overlap(e,w)) e.x=dx>0?w.x-e.w:w.x+w.w; }
function moveY(e,dy,walls){ e.y+=dy; for(const w of walls) if(overlap(e,w)) e.y=dy>0?w.y-e.h:w.y+w.h; }

function loadRoom(idx){
  currentRoomIdx=idx;
  const rd=ROOMS[idx];
  player.x=rd.playerStart.x; player.y=rd.playerStart.y;
  playerDead=false; deathTimer=0; deathParts=[];
  roomEnemies=rd.enemies.map(e=>({...e}));
  roomObstacles=rd.obstacles.map(o=>({...o}));
  frameCount=0;
  secretTriggered = false;
  parkourTransitionActive = false;
  parkourTransitionTimer = 0;
}

function drawChecker(){ const S=25; for(let r=0;r<Math.ceil(H/S);r++) for(let c=0;c<Math.ceil(W/S);c++){ ctx.fillStyle=(r+c)%2===0?'#2a0f0f':'#1e0a0a'; ctx.fillRect(c*S,r*S,S,S); } }
function scanlines(){ for(let y=0;y<H;y+=3){ ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,y,W,1); } }
function drawWall(w){ ctx.fillStyle='#3a1515'; ctx.fillRect(w.x,w.y,w.w,w.h); ctx.fillStyle='#5e2222'; ctx.fillRect(w.x,w.y,w.w,2); ctx.fillRect(w.x,w.y,2,w.h); ctx.fillStyle='#1f0a0a'; ctx.fillRect(w.x,w.y+w.h-2,w.w,2); ctx.fillRect(w.x+w.w-2,w.y,2,w.h); }
function drawExit(ex,isFinal){ const g=.5+.5*Math.sin(frameCount*.06); if(isFinal){ ctx.fillStyle=`rgba(255,100,100,${.07+g*.06})`; ctx.fillRect(ex.x-10,ex.y-10,ex.w+20,ex.h+20); ctx.fillStyle=`rgba(255,120,120,${.4+g*.3})`; ctx.fillRect(ex.x,ex.y,ex.w,ex.h); ctx.strokeStyle='#ffaaaa'; ctx.lineWidth=2; ctx.strokeRect(ex.x,ex.y,ex.w,ex.h); ctx.fillStyle='#fff'; ctx.font='14px monospace'; ctx.textAlign='center'; ctx.fillText('?',ex.x+ex.w/2,ex.y+ex.h/2+5); } else { ctx.fillStyle=`rgba(200,100,100,${.15+g*.1})`; ctx.fillRect(ex.x-4,ex.y-4,ex.w+8,ex.h+8); ctx.fillStyle='#c99'; ctx.fillRect(ex.x,ex.y,ex.w,ex.h); ctx.strokeStyle='#ff8888'; ctx.lineWidth=2; ctx.strokeRect(ex.x,ex.y,ex.w,ex.h); ctx.fillStyle='#a55'; ctx.fillRect(ex.x+3,ex.y+ex.h/2-3,5,5); } }
function drawObstacle(o){ ctx.fillStyle='#6b0000'; ctx.fillRect(o.x,o.y,o.w,o.h); ctx.fillStyle='#cc0000'; ctx.fillRect(o.x,o.y,o.w,2); ctx.fillRect(o.x,o.y,2,o.h); ctx.fillStyle='#ff4040'; for(let i=0;i<Math.floor(o.w/6);i++){ ctx.beginPath(); ctx.moveTo(o.x+i*6,o.y); ctx.lineTo(o.x+i*6+3,o.y-5); ctx.lineTo(o.x+i*6+6,o.y); ctx.fill(); } }
function drawStickman(x,y,color){ x=Math.round(x); y=Math.round(y); const leg=Math.sin(animFrame*.35)*3; ctx.fillStyle=color; ctx.fillRect(x+4,y,6,6); ctx.fillRect(x+6,y+6,2,2); ctx.fillRect(x+5,y+8,4,7); ctx.fillRect(x+1,y+9,4,2); ctx.fillRect(x+9,y+9,4,2); ctx.fillRect(x+5,y+15,2,5+leg); ctx.fillRect(x+8,y+15,2,5-leg); }
function drawSpider(cx,cy,s,color){ cx=Math.round(cx); cy=Math.round(cy); ctx.fillStyle=color; ctx.fillRect(cx-s*3,cy-s*2,s*6,s*5); ctx.fillRect(cx-s*2,cy-s*4,s*4,s*2); ctx.fillRect(cx-s*2,cy-s*6,s*4,s*3); ctx.fillStyle='#000'; ctx.fillRect(cx-s,cy-s*5,s,s); ctx.fillRect(cx,cy-s*5,s,s); ctx.fillStyle=color; ctx.fillRect(cx-s*7,cy-s*3,s*4,s); ctx.fillRect(cx-s*8,cy-s*4,s*2,s); ctx.fillRect(cx-s*7,cy-s*1,s*4,s); ctx.fillRect(cx-s*8,cy-s*2,s*2,s); ctx.fillRect(cx-s*7,cy+s*1,s*4,s); ctx.fillRect(cx-s*8,cy+s*0,s*2,s); ctx.fillRect(cx-s*5,cy+s*3,s*4,s); ctx.fillRect(cx-s*5,cy+s*2,s*2,s); ctx.fillRect(cx+s*3,cy-s*3,s*4,s); ctx.fillRect(cx+s*6,cy-s*4,s*2,s); ctx.fillRect(cx+s*3,cy-s*1,s*4,s); ctx.fillRect(cx+s*6,cy-s*2,s*2,s); ctx.fillRect(cx+s*3,cy+s*1,s*4,s); ctx.fillRect(cx+s*6,cy+s*0,s*2,s); ctx.fillRect(cx+s*1,cy+s*3,s*4,s); ctx.fillRect(cx+s*1,cy+s*2,s*2,s); }

function updatePlaying(dt){
  if(playerDead){
    deathTimer+=dt;
    for(const p of deathParts){ p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.life-=dt; }
    if(deathTimer>2200) loadRoom(currentRoomIdx);
    return;
  }
  if (parkourTransitionActive) {
    parkourTransitionTimer -= dt;
    if (parkourTransitionTimer <= 0) {
      parkourTransitionActive = false;
      iniciarParkour();
    }
    return;
  }
  const rd=ROOMS[currentRoomIdx];
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) dx-=player.speed;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx+=player.speed;
  if(keys['ArrowUp']||keys['w']||keys['W']) dy-=player.speed;
  if(keys['ArrowDown']||keys['s']||keys['S']) dy+=player.speed;
  if(dx&&dy){ dx*=.707; dy*=.707; }
  if(dx) player.facing=dx>0?1:-1;
  moveX(player,dx,rd.walls);
  moveY(player,dy,rd.walls);
  for(const o of roomObstacles){ if(o.dx){ o.x+=o.dx; if(o.x<=o.minX||o.x+o.w>=o.maxX) o.dx*=-1; } if(o.dy){ o.y+=o.dy; if(o.y<=o.minY||o.y+o.h>=o.maxY) o.dy*=-1; } if(overlap(player,o)) killPlayer(); }
  for(const en of roomEnemies){ if(!en.alive) continue; const ex=player.x-en.x, ey=player.y-en.y; const d=Math.hypot(ex,ey); if(d>1){ moveX(en,(ex/d)*en.speed,rd.walls); moveY(en,(ey/d)*en.speed,rd.walls); } if(overlap(player,en)) killPlayer(); }
  if(overlap(player,rd.exit)){ if(currentRoomIdx===ROOMS.length-1) startCutscene(); else loadRoom(currentRoomIdx+1); }
  if (currentRoomIdx === 1 && !secretTriggered && !parkourTransitionActive && player.x <= B+5) {
    secretTriggered = true;
    parkourTransitionActive = true;
    parkourTransitionTimer = 2000;
  }
}
function killPlayer(){ if(playerDead) return; playerDead=true; deathTimer=0; for(let i=0;i<20;i++){ const a=Math.random()*Math.PI*2, sp=1+Math.random()*3; deathParts.push({x:player.x+7,y:player.y+10,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:900}); } }

function drawGame(){
  const rd=ROOMS[currentRoomIdx];
  drawChecker();
  for(const w of rd.walls) drawWall(w);
  drawExit(rd.exit, currentRoomIdx===ROOMS.length-1);
  for(const o of roomObstacles) drawObstacle(o);
  for(const en of roomEnemies){ if(!en.alive) continue; const bob=Math.sin(frameCount*.14)*2; drawSpider(en.x+7,en.y+10+bob,4,'#8b0000'); ctx.fillStyle='#ff0000'; ctx.shadowBlur=6; ctx.fillRect(en.x+2,en.y+1,4,4); ctx.fillRect(en.x+8,en.y+1,4,4); ctx.shadowBlur=0; }
  for(const p of deathParts){ const a=Math.max(0,p.life/900); ctx.fillStyle=`rgba(255,30,30,${a})`; ctx.fillRect(Math.round(p.x),Math.round(p.y),4,4); }
  if(!playerDead){ drawStickman(player.x,player.y,'#ff6060'); ctx.fillStyle='rgba(255,0,0,0.2)'; ctx.fillRect(player.x+2,player.y+player.h+1,player.w-4,3); } else if(deathTimer<300){ ctx.fillStyle='#ff6060'; ctx.font='bold 22px monospace'; ctx.textAlign='left'; ctx.fillText('†',player.x+1,player.y+16); }
  ctx.fillStyle='rgba(220,150,150,0.7)'; ctx.font='11px "Courier New",monospace'; ctx.textAlign='left'; ctx.fillText(rd.name,30,42); ctx.textAlign='right'; ctx.fillText(`${currentRoomIdx+1}/11`,W-30,42);
  if(rd.hint&&frameCount<200){ const a=frameCount<160?1:1-(frameCount-160)/40; ctx.fillStyle=`rgba(255,150,150,${a*.8})`; ctx.textAlign='center'; ctx.fillText(rd.hint,W/2,H-35); }
  if(playerDead&&deathTimer>500){ ctx.fillStyle='rgba(255,60,60,.9)'; ctx.font='14px monospace'; ctx.textAlign='center'; ctx.fillText('MORREU...',W/2,H/2); }
  if(parkourTransitionActive){
    const flash = Math.floor(Date.now()/300)%2===0;
    ctx.fillStyle = flash ? 'rgba(255,80,80,0.85)' : 'rgba(200,40,40,0.85)';
    ctx.font = 'bold 18px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('! ZONA SECRETA ENCONTRADA !', W/2, H/2);
  }
  scanlines();
}

function iniciarParkour() {
  parkour.vx = 0;
  parkour.vy = 0;
  parkour.onGround = true;
  parkour.currentPlatform = 0;
  parkour.platformCounter = 0;
  parkour.effectIndex = 0;
  parkour.effectTimer = 0;
  parkour.effectActive = false;
  parkour.completed = false;
  parkour.showTable = false;
  parkour.finalTable = null;
  currentEffect = null;
  shakeOffset = { x: 0, y: 0 };

  // Gerar 14 plataformas
  parkour.platforms = [];
  for (let i = 0; i < 14; i++) {
    let x = 60 + i * 55;
    let y = 300 + Math.sin(i * 0.8) * 40;
    y = Math.min(Math.max(y, 240), 370);
    parkour.platforms.push({ x, y, w: 45, h: 12 });
  }
  // Remove a última (índice 13) e torna a nova última (índice 12) na mesa
  parkour.platforms.pop();
  const lastIdx = parkour.platforms.length - 1;
  parkour.platforms[lastIdx].isTable = true;

  const first = parkour.platforms[0];
  parkour.x = first.x + (first.w - parkour.w) / 2;
  parkour.y = first.y - parkour.h;
  parkour.active = true;
  gameState = 'PARKOUR';
}

function updateParkour(dt) {
  if (!parkour.active) return;
  let dx = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx = -MAX_SPEED;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = MAX_SPEED;
  parkour.vx = dx;
  parkour.x += parkour.vx;
  parkour.x = Math.min(Math.max(parkour.x, 30), W - parkour.w - 30);
  if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && parkour.onGround) {
    parkour.vy = JUMP_POWER;
    parkour.onGround = false;
  }
  const prevFeetY = parkour.y + parkour.h;
  parkour.vy += GRAVITY;
  parkour.y  += parkour.vy;
  parkour.onGround = false;
  for (let i = 0; i < parkour.platforms.length; i++) {
    const p = parkour.platforms[i];
    const feetY = parkour.y + parkour.h;
    const overlapX = parkour.x + parkour.w > p.x && parkour.x < p.x + p.w;
    const landed = parkour.vy >= 0 && prevFeetY <= p.y + 4 && feetY >= p.y;
    if (overlapX && landed) {
      parkour.y = p.y - parkour.h;
      parkour.vy = 0;
      parkour.onGround = true;
      if (i > parkour.currentPlatform) {
        parkour.currentPlatform = i;
        parkour.platformCounter++;
        if (parkour.platformCounter % 3 === 0 && !parkour.completed) {
          parkour.effectActive = true;
          parkour.effectTimer  = 3500;
          const effects = ['invert', 'firstperson', 'shake'];
          currentEffect = effects[parkour.effectIndex % effects.length];
          parkour.effectIndex++;
        }
      }
      break;
    }
  }
  if (parkour.y > H + 50) {
    gameState = 'PLAYING';
    parkour.active = false;
    return;
  }
  const lastPlat = parkour.platforms[parkour.platforms.length - 1];
  if (lastPlat.isTable && !parkour.completed && parkour.onGround &&
      parkour.x + parkour.w > lastPlat.x && parkour.x < lastPlat.x + lastPlat.w) {
    parkour.completed = true;
    parkour.active = false;
    gameState = 'TABLE_ROOM';
    tableRoomState.playerX = 60;
    tableRoomState.playerY = 295;
    tableRoomState.playerFacing = 1;
    tableRoomState.scriptRead = false;
    tableRoomState.nearTable = false;
    tableRoomState.promptAlpha = 0;
    return;
  }
  if (parkour.effectActive) {
    parkour.effectTimer -= dt;
    if (parkour.effectTimer <= 0) {
      parkour.effectActive = false;
      currentEffect = null;
      shakeOffset = { x: 0, y: 0 };
    } else if (currentEffect === 'shake') {
      shakeOffset = { x: (Math.random() - 0.5) * 6, y: (Math.random() - 0.5) * 4 };
    }
  } else {
    shakeOffset = { x: 0, y: 0 };
  }
}

  ctx.save();
  if (currentEffect === 'invert') ctx.filter = 'invert(1)';
  if (shakeOffset.x || shakeOffset.y) ctx.translate(shakeOffset.x, shakeOffset.y);

  }
  scanlines();
}

function drawTitle(){
  drawChecker();
  ctx.textAlign = 'center';
  const fl=Math.sin(frameCount*.07)>.7;
  ctx.fillStyle=fl?'#ff4040':'#dd2020';
  ctx.font='bold 52px "Courier New",monospace';
  ctx.fillText('MINI GAME',W/2,H/2-50);
  ctx.fillStyle='rgba(255,150,150,.8)';
  ctx.font='15px monospace';
  ctx.fillText(isMobile?'Usa o joystick e o botão vermelho':'Usa as setas ou WASD',W/2,H/2+20);
  ctx.fillText(isMobile?'Pressione o botão vermelho':'Pressione ENTER para começar',W/2,H/2+48);
  drawSpider(W-60,H-60,4,'#5a1a1a');
  scanlines();
}

function update(dt){
  frameCount++;
  animTimer+=dt; if(animTimer>80){ animFrame++; animTimer=0; }
  if(gameState==='PLAYING') updatePlaying(dt);
  else if(gameState==='PARKOUR') updateParkour(dt);
  else if(gameState==='TABLE_ROOM') updateTableRoom(dt);
  else updateCutscene(dt);
}
function draw(){
  ctx.clearRect(0,0,W,H);
  if(gameState==='TITLE') drawTitle();
  else if(gameState==='PLAYING') drawGame();
  else if(gameState==='PARKOUR') drawParkour();
  else if(gameState==='TABLE_ROOM') drawTableRoom();
  else if(gameState==='CUT_LEGS') drawCutLegs();
  else if(gameState==='CUT_BLACK') drawCutBlack();
  else if(gameState==='CUT_VIRUS') drawCutVirus();
  else if(gameState==='CUT_JUMP') drawCutJump();
  else if(gameState==='CRASH') drawCrash();
}
function loop(ts){
  const dt=lastTime?Math.min(ts-lastTime,50):16; lastTime=ts;
  update(dt); draw(); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

if (isMobile) {
  const joyCanvas = document.getElementById('joystickCanvas');
  const joyCtx = joyCanvas.getContext('2d');
  joyCanvas.width = 200; joyCanvas.height = 200;
  let joyActive=false, joyX=100, joyY=100, joyVec={x:0,y:0}, touchId=null;
  const joyRad=60, knobRad=25;
  function updateJoy(tx,ty){
    const rect=joyCanvas.getBoundingClientRect();
    let cx=(tx-rect.left)*(200/rect.width), cy=(ty-rect.top)*(200/rect.height);
    cx=Math.min(Math.max(cx,0),200); cy=Math.min(Math.max(cy,0),200);
    const dx=cx-100, dy=cy-100, dist=Math.hypot(dx,dy);
    let nx=0, ny=0;
    if(dist>joyRad){ nx=dx/dist; ny=dy/dist; joyX=100+nx*joyRad; joyY=100+ny*joyRad; } else { joyX=cx; joyY=cy; nx=dx/joyRad; ny=dy/joyRad; }
    joyVec={x:nx,y:ny};
    const th=0.3;
    keys['ArrowUp']=joyVec.y<-th; keys['ArrowDown']=joyVec.y>th;
    keys['ArrowLeft']=joyVec.x<-th; keys['ArrowRight']=joyVec.x>th;
  }
  function resetJoy(){ joyX=100; joyY=100; joyVec={x:0,y:0}; keys['ArrowUp']=keys['ArrowDown']=keys['ArrowLeft']=keys['ArrowRight']=false; joyActive=false; touchId=null; }
  function drawJoy(){ joyCtx.clearRect(0,0,200,200); joyCtx.beginPath(); joyCtx.arc(100,100,joyRad,0,Math.PI*2); joyCtx.fillStyle='rgba(30,0,0,0.7)'; joyCtx.fill(); joyCtx.strokeStyle='#aa3333'; joyCtx.stroke(); joyCtx.beginPath(); joyCtx.arc(joyX,joyY,knobRad,0,Math.PI*2); joyCtx.fillStyle='#cc5555'; joyCtx.fill(); joyCtx.strokeStyle='#ff8888'; joyCtx.stroke(); }
  joyCanvas.addEventListener('touchstart',e=>{ e.preventDefault(); const t=e.touches[0]; if(t){ touchId=t.identifier; joyActive=true; updateJoy(t.clientX,t.clientY); } });
  joyCanvas.addEventListener('touchmove',e=>{ e.preventDefault(); if(!joyActive)return; for(let i=0;i<e.touches.length;i++) if(e.touches[i].identifier===touchId){ updateJoy(e.touches[i].clientX,e.touches[i].clientY); break; } });
  joyCanvas.addEventListener('touchend',e=>{ e.preventDefault(); resetJoy(); });
  joyCanvas.addEventListener('mousedown',e=>{ e.preventDefault(); joyActive=true; updateJoy(e.clientX,e.clientY); });
  window.addEventListener('mousemove',e=>{ if(joyActive) updateJoy(e.clientX,e.clientY); });
  window.addEventListener('mouseup',()=>{ if(joyActive) resetJoy(); });
  function animateJoy(){ drawJoy(); requestAnimationFrame(animateJoy); }
  animateJoy();

  document.getElementById('enterButton').addEventListener('touchstart', e => {
    e.preventDefault();
    if(gameState==='TITLE'){ gameState='PLAYING'; loadRoom(0); return; }
    if(gameState==='PARKOUR'){ keys[' ']=true; return; }
    if(gameState==='TABLE_ROOM'){ keys['e']=true; return; }
  });
  document.getElementById('enterButton').addEventListener('touchend', e => {
    e.preventDefault();
    keys[' ']=false; keys['e']=false;
  });
  document.getElementById('enterButton').addEventListener('click',()=>{
    if(gameState==='TITLE'){ gameState='PLAYING'; loadRoom(0); }
  });
}
